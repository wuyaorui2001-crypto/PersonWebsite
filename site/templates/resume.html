<article class="resume-page" data-resume-i18n>
  <h1 class="page-title">个人简历</h1>
  <header class="resume-header">
    <p class="resume-updated">更新于 {{updated}}</p>
  </header>
  <div class="resume-locale is-active" data-lang="zh">
    <div class="resume-body">{{resume_zh}}</div>
  </div>
  <div class="resume-locale" data-lang="en">
    <div class="resume-body">{{resume_en}}</div>
  </div>
</article>
<div class="i18n-toggle" role="group" aria-label="简历语言">
  <button type="button" data-lang="zh" class="is-active" aria-pressed="true">中文</button>
  <button type="button" data-lang="en" aria-pressed="false">English</button>
</div>
